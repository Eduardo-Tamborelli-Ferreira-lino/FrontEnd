<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast</title>
    <link rel="Stylesheet" href="style.css">
</head>
<body>
    
    <h1>WeatherSnap ☀️</h1>

    <div id ="topico">
        <p id = "inicio">⌂ Home</p>
        <div id = "comparar">
        <p>〽︎ Compare  </p>
        <p id = "numero">3</p>
    </div>
    </div>

    <div id="busca">
        <input type ="text" id = "city" placeholder=  "🔍︎ Search city...">
        <button id="search-btn" onclick="buscarCidade()">Search</button>
    </div>

    <div id="principal">
        <div id = "cidade-compartilhamento">
            <div id="cidade-data">
                <p id = "cidade-apresentar">Brasilia, Plano Piloto</p>
                <p id = "data">Thursday, April 24</p>
            </div>
            <div id="compartilhamento">
                <p>〽︎</p>
                <p>➦</p>
            </div>
        </div>

        <div id="div-temperatura">
            <p id="current-icon">☁︎</p>
            <p id = "temperatura">24°C </p>
        </div>

        <div id="div-clima">
            <p id = "clima"> Cloudy</p>
            <div id="vento-umidade">
            <p id = "vento">☴ 15.3 km/h</p>
            <p id = "umidade">🌢 63%</p>
            </div>
        </div>

        <div id = "mensagem">
            <p> How about taking the opportunity to visit a museum or cinema today?</p>
        </div>

        <p id = "msg-proximosDias">Next days</p>
        <div id = "proximosDias">
            <div class ="dias">
                <p id="name-1" class = "diaDaSemana">Thu</p>
                <p id="icon-1" class = "clima">☁️</p>
                <p id="temp-1" class = "temperatura">26°C</p>
            </div>

            <div class ="dias">
                <p id="name-2" class = "diaDaSemana">Fri</p>
                <p id="icon-2" class = "clima">🌧️</p>
                <p id="temp-2" class = "temperatura">28°C</p>
            </div>

            <div class ="dias">
                <p id="name-3" class = "diaDaSemana">Sat</p>
                <p id="icon-3" class = "clima">🌧️</p>
                <p id="temp-3" class = "temperatura">26°C</p>
            </div>      
        </div>
    </div>

<script src="script.js"></script>
</body>
</html>
