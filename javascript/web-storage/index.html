<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Web storage</title>
</head>

<body>

    <header id="header">
        <div class="logo">
            <h1>MI79</h1>
        </div>
        <!-- Alter thema for dark and light -->
        <div id="btn">
            <button id="thema-btn">☀️</button>
        </div>
    </header>

    <main class="container">

        <!-- Display the name of the user  -->
        <section id="display-name">
            <div id="hello">
                <h2>Hello</h2>
            </div>
            <div id="name">

            </div>
            <div id="phrase">
                <h2> how're you?</h2>
            </div>
        </section>

        <div id="line-divider"></div>

        <!-- List all users sing in -->
        <section id="list">
            <div id="users-list">

            </div>
        </section>

        <!-- Buttons for Add user and delete users -->
        <section id="btns">
            <div id="add-user">
                <input type="text" id="user" placeholder="User name">
                <button id="add" class="btn">Add name</button>
            </div>
            <div id="clear-btn">
                <button id="clear" class="btn">Clear list</button>
            </div>
        </section>

    </main>

    <footer id="footer">
        <h3>Made by: Eduardo Tamborelli Ferreira Lino</h3>
        <p>Visits: <span id="visit-count">0</span></p>
    </footer>

    <script src="script.js"></script>

</body>

</html>
